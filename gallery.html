<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelVault - Premium Stock Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .masonry-grid { column-count: 4; column-gap: 1.5rem; }
        @media (max-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (max-width: 640px) { .masonry-grid { column-count: 2; } }
        .masonry-item { break-inside: avoid; margin-bottom: 1.5rem; }
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
        }
        .dark .hero-bg { background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)), url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen">
    <!-- NAVBAR -->
    <nav class="bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-camera text-3xl text-yellow-500"></i>
                    <span class="text-2xl font-bold tracking-tight">PixelVault</span>
                </div>
                <div class="hidden md:flex items-center gap-6 text-sm font-medium">
                    <a href="#" onclick="navigateTo('home')" class="hover:text-yellow-500">Discover</a>
                    <a href="#" onclick="navigateTo('gallery')" class="hover:text-yellow-500">Gallery</a>
                    <a href="#" onclick="navigateTo('dashboard')" class="hover:text-yellow-500">Dashboard</a>
                    <a href="#" onclick="navigateTo('admin')" class="hover:text-yellow-500 admin-only hidden">Admin</a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative w-80 hidden md:block">
                    <input id="search-input" onkeyup="if(event.key==='Enter') searchImages()" type="text" placeholder="Search images..." 
                           class="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-2xl py-3 px-5 pl-12 focus:outline-none focus:border-yellow-400">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-3.5 text-zinc-400"></i>
                </div>
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 flex items-center justify-center">
                    <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
                </button>
                <div id="auth-section" class="flex items-center gap-3"></div>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section id="home-page" class="hero-bg h-screen flex items-center text-white">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <h1 class="text-6xl md:text-7xl font-bold mb-6 tracking-tighter">Discover the world's<br>best visuals</h1>
            <p class="text-xl md:text-2xl text-zinc-200 mb-10 max-w-2xl mx-auto">Curated premium stock photography. Free to download.</p>
            <button onclick="navigateTo('gallery')" class="bg-white text-black px-8 py-4 rounded-3xl font-semibold flex items-center gap-3 hover:scale-105">
                <i class="fa-solid fa-search"></i> Browse Gallery
            </button>
        </div>
    </section>

    <!-- CATEGORY FILTERS -->
    <div class="max-w-7xl mx-auto px-6 py-6 border-b border-zinc-200 dark:border-zinc-800">
        <div id="category-filters" class="flex gap-3 flex-wrap"></div>
    </div>

    <!-- GALLERY PAGE -->
    <div id="gallery-page" class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-semibold">Featured Collection</h2>
            <button onclick="showUploadModal()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-6 py-3 rounded-3xl flex items-center gap-2">
                <i class="fa-solid fa-upload"></i> Upload Image
            </button>
        </div>
        <div id="masonry-grid" class="masonry-grid"></div>
    </div>

    <!-- UPLOAD MODAL -->
    <div id="upload-modal" class="hidden fixed inset-0 bg-black/70 z-[200] flex items-center justify-center">
        <div class="bg-white dark:bg-zinc-900 rounded-3xl w-full max-w-md mx-4 p-8">
            <h3 class="text-2xl font-semibold mb-6">Upload New Image</h3>
            <input id="upload-file" type="file" accept="image/*" class="block w-full mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-yellow-500 file:text-black">
            <input id="upload-title" type="text" placeholder="Image Title" class="w-full p-4 rounded-2xl bg-zinc-100 dark:bg-zinc-800 mb-4">
            <select id="upload-category" class="w-full p-4 rounded-2xl bg-zinc-100 dark:bg-zinc-800 mb-6">
                <option value="Nature">Nature</option>
                <option value="Urban">Urban</option>
                <option value="Portrait">Portrait</option>
                <option value="Abstract">Abstract</option>
            </select>
            <div class="flex gap-4">
                <button onclick="closeUploadModal()" class="flex-1 py-4 border border-zinc-300 dark:border-zinc-700 rounded-3xl font-medium">Cancel</button>
                <button onclick="uploadUserImage()" class="flex-1 bg-yellow-500 hover:bg-yellow-600 text-black font-semibold py-4 rounded-3xl">Upload Now</button>
            </div>
        </div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center">
        <div class="max-w-5xl w-full mx-4 bg-zinc-900 rounded-3xl overflow-hidden">
            <div class="flex justify-between items-center p-4 border-b border-zinc-700">
                <div class="flex items-center gap-3">
                    <img id="lightbox-avatar" src="https://picsum.photos/id/64/32/32" class="w-8 h-8 rounded-full">
                    <div>
                        <div id="lightbox-author" class="font-medium"></div>
                        <div id="lightbox-date" class="text-xs text-zinc-500"></div>
                    </div>
                </div>
                <div class="flex items-center gap-6 text-xl">
                    <button onclick="deleteCurrentImage()" class="hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                    <button onclick="downloadCurrent()" class="hover:text-yellow-400"><i class="fa-solid fa-download"></i></button>
                    <button onclick="closeLightbox()" class="text-3xl leading-none hover:text-red-400">×</button>
                </div>
            </div>
            <div class="relative bg-black">
                <img id="lightbox-image" class="w-full max-h-[70vh] object-contain mx-auto" alt="">
            </div>
        </div>
    </div>

    <!-- DASHBOARD & ADMIN PANEL (kept same) -->
    <div id="dashboard-page" class="hidden max-w-7xl mx-auto px-6 py-10">
        <h2 class="text-3xl font-semibold mb-8">My Dashboard</h2>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="bg-white dark:bg-zinc-900 rounded-3xl p-8 border border-zinc-200 dark:border-zinc-800 text-center">
                    <div onclick="triggerProfileUpload()" class="relative cursor-pointer inline-block">
                        <img id="profile-pic" src="https://picsum.photos/id/64/128/128" class="w-32 h-32 rounded-3xl object-cover mx-auto border-4 border-white dark:border-zinc-900">
                        <div class="absolute bottom-2 right-2 bg-yellow-500 w-8 h-8 rounded-2xl flex items-center justify-center text-black">
                            <i class="fa-solid fa-camera"></i>
                        </div>
                    </div>
                    <input type="file" id="profile-upload" accept="image/*" class="hidden" onchange="uploadProfilePic(event)">
                    <h3 id="dashboard-name" class="mt-6 text-2xl font-semibold"></h3>
                    <p id="dashboard-email" class="text-zinc-500"></p>
                    <button onclick="logout()" class="mt-8 w-full py-4 text-red-500 border border-red-200 dark:border-red-900 rounded-3xl">Sign Out</button>
                </div>
            </div>
            <div class="lg:col-span-8">
                <h3 class="font-semibold mb-6">My Favorites</h3>
                <div id="favorites-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </div>

    <div id="admin-page" class="hidden max-w-7xl mx-auto px-6 py-10">
        <h2 class="text-3xl font-semibold mb-8">Admin Panel</h2>
        <div class="bg-white dark:bg-zinc-900 rounded-3xl p-8">
            <div class="flex gap-4 mb-8">
                <button onclick="showAdminTab(0)" id="admin-tab-0" class="px-6 py-3 rounded-3xl font-medium active">Upload</button>
                <button onclick="showAdminTab(1)" id="admin-tab-1" class="px-6 py-3 rounded-3xl font-medium">Manage Images</button>
            </div>
            <div id="admin-manage-tab" class="hidden">
                <div id="admin-image-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentLightboxIndex = -1;
        let images = JSON.parse(localStorage.getItem('pixelvault_images')) || [
            {id:1, url:"https://picsum.photos/id/1015/800/600", title:"Mountain Lake", author:"Sarah Chen", likes:1240, downloads:892, category:"Nature", date:"2025-05-12"},
            {id:2, url:"https://picsum.photos/id/201/800/600", title:"Tokyo Nights", author:"Kenji Sato", likes:875, downloads:421, category:"Urban", date:"2025-06-01"},
            {id:3, url:"https://picsum.photos/id/237/800/600", title:"Golden Retriever", author:"Maria Lopez", likes:2340, downloads:1567, category:"Nature", date:"2025-04-22"}
        ];
        let favorites = JSON.parse(localStorage.getItem('pixelvault_favorites')) || [];

        function saveData() {
            localStorage.setItem('pixelvault_images', JSON.stringify(images));
        }

        function checkAuth() {
            const saved = localStorage.getItem("currentUser");
            if (saved) {
                currentUser = JSON.parse(saved);
                renderAuthUI();
            } else {
                renderGuestUI();
            }
        }

        function renderAuthUI() {
            document.getElementById("auth-section").innerHTML = `
                <div onclick="navigateTo('dashboard')" class="flex items-center gap-3 cursor-pointer">
                    <img src="${currentUser.avatar || 'https://picsum.photos/id/64/32/32'}" class="w-8 h-8 rounded-2xl object-cover">
                    <span class="hidden md:block font-medium">${currentUser.name}</span>
                </div>
                <button onclick="logout()" class="px-5 py-2 border border-zinc-300 dark:border-zinc-700 rounded-3xl text-sm">Logout</button>
            `;
            if (currentUser.role === 'admin') document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
        }

        function renderGuestUI() {
            document.getElementById("auth-section").innerHTML = `
                <button onclick="showLoginModal()" class="px-6 py-2 text-sm">Log in</button>
                <button onclick="showRegisterModal()" class="bg-yellow-500 hover:bg-yellow-600 text-black px-6 py-2 rounded-3xl text-sm font-semibold">Sign up</button>
            `;
        }

        function showLoginModal() {
            const email = prompt("Enter email:");
            if (!email) return;
            currentUser = {id: Date.now(), name: "Alex Rivera", email: email, avatar: "https://picsum.photos/id/64/128/128", role: "user"};
            localStorage.setItem("currentUser", JSON.stringify(currentUser));
            renderAuthUI();
            alert("Logged in successfully (Demo)");
        }

        function showRegisterModal() {
            const name = prompt("Your name:");
            if (!name) return;
            currentUser = {id: Date.now(), name: name, email: "user@example.com", avatar: "https://picsum.photos/id/64/128/128", role: "user"};
            localStorage.setItem("currentUser", JSON.stringify(currentUser));
            renderAuthUI();
            alert("Account created (Demo)");
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem("currentUser");
            renderGuestUI();
            navigateTo('home');
        }

        function showUploadModal() {
            if (!currentUser) return alert("Please log in to upload images");
            document.getElementById('upload-modal').classList.remove('hidden');
        }

        function closeUploadModal() {
            document.getElementById('upload-modal').classList.add('hidden');
        }

        function uploadUserImage() {
            const file = document.getElementById('upload-file').files[0];
            const title = document.getElementById('upload-title').value.trim() || "Untitled";
            const category = document.getElementById('upload-category').value;

            if (!file) return alert("Please select an image file");

            const reader = new FileReader();
            reader.onload = function(e) {
                const newImg = {
                    id: Date.now(),
                    url: e.target.result,
                    title: title,
                    author: currentUser.name,
                    likes: 0,
                    downloads: 0,
                    category: category,
                    date: new Date().toISOString().split('T')[0]
                };
                images.unshift(newImg);
                saveData();
                renderGallery();
                closeUploadModal();
                alert("✅ Image uploaded successfully!");
            };
            reader.readAsDataURL(file);
        }

        function renderGallery(filteredImages = images) {
            const container = document.getElementById("masonry-grid");
            container.innerHTML = "";
            filteredImages.forEach((img, index) => {
                const div = document.createElement("div");
                div.className = "masonry-item group cursor-pointer";
                div.innerHTML = `
                    <div class="relative overflow-hidden rounded-3xl shadow-md">
                        <img src="${img.url}" class="w-full rounded-3xl" alt="${img.title}">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100"></div>
                        <div class="absolute bottom-4 left-4 right-4 opacity-0 group-hover:opacity-100 flex justify-between items-end">
                            <div class="text-white">
                                <div class="font-medium">${img.title}</div>
                                <div class="text-xs">${img.author}</div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="event.stopImmediatePropagation(); downloadImage(${img.id});" class="text-2xl text-white hover:text-yellow-400">
                                    <i class="fa-solid fa-download"></i>
                                </button>
                                <button onclick="event.stopImmediatePropagation(); deleteImage(${img.id});" class="text-2xl text-red-400 hover:text-red-500">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                div.onclick = () => openLightbox(index);
                container.appendChild(div);
            });
        }

        function deleteImage(id) {
            if (!currentUser) return alert("Login required to delete");
            if (!confirm("Delete this image?")) return;

            images = images.filter(img => img.id !== id);
            saveData();
            renderGallery();
            alert("Image deleted successfully");
        }

        function deleteCurrentImage() {
            if (currentLightboxIndex === -1) return;
            deleteImage(images[currentLightboxIndex].id);
            closeLightbox();
        }

        function downloadImage(id) {
            const img = images.find(i => i.id === id);
            if (!img) return;
            const a = document.createElement('a');
            a.href = img.url;
            a.download = img.title + '.jpg';
            a.click();
        }

        function openLightbox(index) {
            currentLightboxIndex = index;
            const img = images[index];
            document.getElementById("lightbox").classList.remove("hidden");
            document.getElementById("lightbox-image").src = img.url;
            document.getElementById("lightbox-author").textContent = img.author;
            document.getElementById("lightbox-date").textContent = img.date;
        }

        function closeLightbox() {
            document.getElementById("lightbox").classList.add("hidden");
        }

        function downloadCurrent() {
            if (currentLightboxIndex === -1) return;
            downloadImage(images[currentLightboxIndex].id);
        }

        function renderCategoryFilters() {
            const cats = ["All", "Nature", "Urban", "Portrait", "Abstract"];
            const container = document.getElementById("category-filters");
            container.innerHTML = "";
            cats.forEach(cat => {
                const btn = document.createElement("button");
                btn.className = `px-6 py-2.5 rounded-3xl text-sm font-medium ${cat === "All" ? "bg-yellow-500 text-black" : "border border-zinc-300 dark:border-zinc-700 hover:border-yellow-400"}`;
                btn.textContent = cat;
                btn.onclick = () => renderGallery(cat === "All" ? images : images.filter(i => i.category === cat));
                container.appendChild(btn);
            });
        }

        function searchImages() {
            const q = document.getElementById("search-input").value.toLowerCase();
            renderGallery(images.filter(img => 
                img.title.toLowerCase().includes(q) || img.author.toLowerCase().includes(q)
            ));
        }

        function navigateTo(page) {
            document.querySelectorAll('#home-page, #gallery-page, #dashboard-page, #admin-page').forEach(el => el.classList.add('hidden'));
            if (page === 'home') document.getElementById('home-page').classList.remove('hidden');
            else if (page === 'gallery') document.getElementById('gallery-page').classList.remove('hidden');
            else if (page === 'dashboard') {
                if (!currentUser) return alert("Please login first");
                document.getElementById('dashboard-page').classList.remove('hidden');
            }
            else if (page === 'admin') {
                if (currentUser && currentUser.role === 'admin') document.getElementById('admin-page').classList.remove('hidden');
                else alert("Admin access only");
            }
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('theme-icon').classList.toggle('fa-moon', !isDark);
            document.getElementById('theme-icon').classList.toggle('fa-sun', isDark);
        }

        function triggerProfileUpload() { document.getElementById('profile-upload').click(); }

        function uploadProfilePic(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                currentUser.avatar = ev.target.result;
                localStorage.setItem("currentUser", JSON.stringify(currentUser));
                document.getElementById("profile-pic").src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function init() {
            checkAuth();
            renderGallery();
            renderCategoryFilters();
            if (localStorage.getItem('darkMode') === 'true') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
            }
            console.log("%c✅ PixelVault Ready with Delete Feature!", "color:#eab308;font-weight:bold");
        }

        window.onload = init;
    </script>
</body>
</html>
